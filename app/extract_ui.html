<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sensor Data Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #00FF41;
      --accent: #00FF41;
      --accent-2: #39FF14;
      --panel: #f9f9f9;
      --line: #e0e0e0;
      --ok: #00FF41;
      --err: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "Space Grotesk", sans-serif;
    }

    .shell {
      max-width: 1100px;
      margin: 24px auto;
      padding: 16px;
    }

    .hero {
      border: 2px solid var(--line);
      background: var(--panel);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(26, 31, 46, 0.08);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3.2vw, 2.6rem);
      letter-spacing: 0.4px;
    }

    .hero p {
      margin: 10px 0 0;
      opacity: 0.85;
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.small { grid-column: span 1; }

    label {
      font-size: 0.88rem;
      font-weight: 600;
      color: #00FF41;
    }

    input {
      border: 2px solid #d0d0d0;
      background: white;
      color: #333333;
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: #00FF41;
      box-shadow: 0 0 0 3px rgba(0, 255, 65, 0.15);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 10px 16px;
      font: 600 0.92rem/1 "Space Grotesk", sans-serif;
      background: #00FF41;
      color: white;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.92; }

    .primary { background: #00FF41; color: white; }
    .warn { background: #00FF41; color: white; }
    .ghost { background: #00FF41; color: white; }

    .status {
      margin-top: 14px;
      min-height: 24px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.86rem;
    }

    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }

    .table-wrap {
      margin-top: 16px;
      border: 2px solid #e0e0e0;
      background: #ffffff;
      border-radius: 12px;
      overflow: auto;
      max-height: 60vh;
      display: block;
    }

    .table-wrap.hidden {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      font-size: 0.92rem;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f5f5f5;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
      padding: 10px 12px;
      vertical-align: top;
    }

    th {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #00FF41;
    }

    .mono {
      font-family: "IBM Plex Mono", monospace;
    }

    @media (max-width: 900px) {
      .field, .field.small { grid-column: span 6; }
      .shell { margin: 10px auto; }
      .hero { padding: 14px; }
      button { width: 100%; }
    }

    .chart-container {
      margin-top: 24px;
      border: 2px solid #e0e0e0;
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      display: none;
    }

    .chart-container.active {
      display: block;
    }

    .chart-container h2 {
      margin: 0 0 16px 0;
      color: #00FF41;
      font-size: 1.3rem;
    }

    .chart-wrapper {
      position: relative;
      height: 400px;
      width: 100%;
    }

    #sensorChart {
      max-width: 100% !important;
    }

    .close-chart {
      float: right;
      background: #00FF41;
      color: white;
      border: 0;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .close-chart:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Sensor Data Extractor - GESEP</h1>
      <p>Filter, preview and export measurements saved in PostgreSQL.</p>

      <div class="grid">
        <div class="field">
          <label for="deviceId">Device ID</label>
          <input id="deviceId" type="text" placeholder="ESP32_PRODUCAO">
        </div>

        <div class="field">
          <label for="startTime">Start Time</label>
          <input id="startTime" type="datetime-local">
        </div>

        <div class="field">
          <label for="endTime">End Time</label>
          <input id="endTime" type="datetime-local">
        </div>

        <div class="field small">
          <label for="skip">Skip</label>
          <input id="skip" type="number" min="0" value="0">
        </div>

        <div class="field small">
          <label for="limit">Limit</label>
          <input id="limit" type="number" min="1" max="5000" value="200">
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="btnLoad">Load Data</button>
        <button class="warn" id="btnCsv">Download CSV</button>
        <button class="ghost" id="btnJson">Download JSON</button>
        <button class="primary" id="btnChart">View Chart</button>
      </div>

      <div id="status" class="status">Ready.</div>

      <div id="chartContainer" class="chart-container">
        <h2>Gráfico de dados do sensor <button class="close-chart" id="btnCloseChart">Fechar</button></h2>
        <div class="chart-wrapper">
          <canvas id="sensorChart"></canvas>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nº</th>
              <th>Device</th>
              <th>Voltage Shunt</th>
              <th>Irradiance</th>
              <th>Date</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="5" class="mono">No data loaded yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");
    window.loadedSensorData = []; // Armazena dados carregados para usar no gráfico

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = `status ${kind}`.trim();
    }

    function getParams(extra = {}) {
      const deviceId = document.getElementById("deviceId").value.trim();
      const startTime = document.getElementById("startTime").value;
      const endTime = document.getElementById("endTime").value;
      const skip = document.getElementById("skip").value || "0";
      const limit = document.getElementById("limit").value || "200";

      const params = new URLSearchParams();
      params.set("skip", skip);
      params.set("limit", limit);
      if (deviceId) params.set("device_id", deviceId);
      if (startTime) params.set("start_time", startTime + ":00"); // Adiciona :00 se não tiver segundos
      if (endTime) params.set("end_time", endTime + ":00"); // Adiciona :00 se não tiver segundos

      Object.entries(extra).forEach(([k, v]) => params.set(k, String(v)));
      return params;
    }

    function renderRows(data) {
      if (!Array.isArray(data) || data.length === 0) {
        rowsEl.innerHTML = '<tr><td colspan="6" class="mono">No records found.</td></tr>';
        return;
      }

      rowsEl.innerHTML = data.map((row) => {
        let date = "", time = "";
        if (row.timestamp) {
          const ts = new Date(row.timestamp);
          date = ts.toLocaleDateString('pt-BR');
          time = ts.toLocaleTimeString('pt-BR');
        }
        return `
        <tr>
          <td class="mono">${row.id}</td>
          <td>${row.device_id}</td>
          <td>${row.tensao_shunt}</td>
          <td>${row.irradiance}</td>
          <td class="mono">${date}</td>
          <td class="mono">${time}</td>
        </tr>
      `;
      }).join("");
    }

    async function loadData() {
      setStatus("Loading data...");
      try {
        const url = `/api/sensors/?${getParams().toString()}`;
        console.log("Fetching from:", url);
        
        const response = await fetch(url);
        console.log("Response status:", response.status);
        
        if (!response.ok) {
          const errorText = await response.text();
          console.error("Error response:", errorText);
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        console.log("Data received:", data);
        
        window.loadedSensorData = data; // Armazena dados para uso posterior no gráfico
        renderRows(data);
        setStatus(`Loaded ${data.length} record(s).`, "ok");
        
        // Auto-scroll to bottom to see newest data
        setTimeout(() => {
          const tableWrap = document.querySelector(".table-wrap");
          if (tableWrap) {
            tableWrap.scrollTop = tableWrap.scrollHeight;
          }
        }, 100);
      } catch (err) {
        console.error("Load error:", err);
        setStatus(`Failed to load data: ${err.message}`, "err");
      }
    }

    function downloadCsv() {
      const url = `/api/sensors/?${getParams({ format: "csv" }).toString()}`;
      window.open(url, "_blank", "noopener");
      setStatus("CSV export requested.", "ok");
    }

    async function downloadJson() {
      setStatus("Preparing JSON file...");
      try {
        const url = `/api/sensors/?${getParams().toString()}`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `sensor_data_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        setStatus(`JSON exported with ${data.length} record(s).`, "ok");
      } catch (err) {
        setStatus(`Failed to export JSON: ${err.message}`, "err");
      }
    }

    // Register event listeners with error handling
    console.log("📋 Registering event listeners...");
    try {
      document.getElementById("btnLoad").addEventListener("click", () => {
        console.log("🖱️ Load Data clicked");
        loadData().catch(err => console.error("Load error:", err));
      });
      
      document.getElementById("btnCsv").addEventListener("click", () => {
        console.log("🖱️ Download CSV clicked");
        downloadCsv();
      });
      
      document.getElementById("btnJson").addEventListener("click", () => {
        console.log("🖱️ Download JSON clicked");
        downloadJson().catch(err => console.error("JSON error:", err));
      });
      
      document.getElementById("btnCloseChart").addEventListener("click", () => {
        console.log("🖱️ Close Chart clicked");
        document.getElementById("chartContainer").classList.remove("active");
        document.querySelector(".table-wrap").classList.remove("hidden");
        if (window.sensorChart && typeof window.sensorChart.destroy === "function") {
          window.sensorChart.destroy();
          window.sensorChart = null;
        }
      });
      
      document.getElementById("btnChart").addEventListener("click", () => {
        console.log("🖱️ View Chart clicked");
        if (!window.loadedSensorData || window.loadedSensorData.length === 0) {
          setStatus("No data to display. Load data first.", "err");
          return;
        }

        const timestamps = [];
        const shuntVoltages = [];
        const irradianceValues = [];

        window.loadedSensorData.forEach((row) => {
          const shunt = parseFloat(row.tensao_shunt);
          const irrad = parseFloat(row.irradiance);
          
          if (!isNaN(irrad)) {
            timestamps.push(row.timestamp);
            shuntVoltages.push(!isNaN(shunt) ? shunt : null);
            irradianceValues.push(irrad);
          }
        });

        if (timestamps.length === 0) {
          setStatus("No valid data to display.", "err");
          return;
        }

        const timeLabels = timestamps.map((_, index) => `${index * 10}s`);
        const chartContainer = document.getElementById("chartContainer");
        const tableWrap = document.querySelector(".table-wrap");
        chartContainer.classList.add("active");
        tableWrap.classList.add("hidden");

        requestAnimationFrame(() => {
          try {
            if (window.sensorChart && typeof window.sensorChart.destroy === "function") {
              window.sensorChart.destroy();
              window.sensorChart = null;
            }

            const canvas = document.getElementById("sensorChart");
            const ctx = canvas.getContext("2d");
            
            window.sensorChart = new Chart(ctx, {
              type: "line",
              data: {
                labels: timeLabels,
                datasets: [
                  {
                    label: "Irradiance (W/m²)",
                    data: irradianceValues,
                    borderColor: "#000000",
                    backgroundColor: "rgba(0, 0, 0, 0.05)",
                    tension: 0.3,
                    fill: false,
                    borderWidth: 2,
                    pointRadius: 4,
                    pointBackgroundColor: "#000000",
                    yAxisID: "y",
                  },
                  {
                    label: "Voltage Shunt (V)",
                    data: shuntVoltages,
                    borderColor: "#0066FF",
                    backgroundColor: "rgba(0, 102, 255, 0.05)",
                    tension: 0.3,
                    fill: false,
                    borderWidth: 2,
                    pointRadius: 4,
                    pointBackgroundColor: "#0066FF",
                    yAxisID: "y1",
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                  mode: "index",
                  intersect: false,
                },
                plugins: {
                  legend: {
                    display: true,
                    labels: {
                      color: "#333333",
                      font: { size: 12, weight: "600" },
                      usePointStyle: true,
                    },
                  },
                },
                scales: {
                  x: {
                    display: true,
                    ticks: { color: "#333333", maxRotation: 45, minRotation: 0, stepSize: 10 },
                    grid: { color: "rgba(0, 0, 0, 0.1)" },
                    title: { display: true, text: "Time (s)", color: "#333333" },
                  },
                  y: {
                    type: "linear",
                    display: true,
                    position: "left",
                    min: 112,
                    max: 1225,
                    title: {
                      display: true,
                      text: "Irradiance (W/m²)",
                      color: "#000000",
                      font: { weight: "bold" },
                    },
                    ticks: { color: "#000000" },
                    grid: { color: "rgba(0, 0, 0, 0.1)" },
                  },
                  y1: {
                    type: "linear",
                    display: true,
                    position: "right",
                    min: 0.000312,
                    max: 0.0075,
                    title: {
                      display: true,
                      text: "Voltage Shunt (V)",
                      color: "#0066FF",
                      font: { weight: "bold" },
                    },
                    ticks: { color: "#0066FF" },
                    grid: { drawOnChartArea: false },
                  },
                },
              },
            });

            setStatus(`Chart generated with ${timestamps.length} data point(s).`, "ok");
            console.log("✅ Chart rendered successfully");
          } catch (error) {
            setStatus(`Error creating chart: ${error.message}`, "err");
            console.error("❌ Chart error:", error);
          }
        });
      });
      
      console.log("✅ All event listeners registered");
    } catch (err) {
      console.error("❌ Error registering listeners:", err);
    }

    // ===== Real-time SSE streaming =====
    function addRowToTable(row) {
      const tbody = document.getElementById("rows");
      console.log("📥 Adding row to table:", row);
      
      // Remove "No records found" message if present
      if (tbody.querySelector("tr td[colspan='6']")) {
        tbody.innerHTML = "";
      }
      
      let date = "", time = "";
      if (row.timestamp) {
        const ts = new Date(row.timestamp);
        date = ts.toLocaleDateString('pt-BR');
        time = ts.toLocaleTimeString('pt-BR');
      }
      
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="mono">${row.id}</td>
        <td>${row.device_id}</td>
        <td>${row.tensao_shunt.toFixed(6)}</td>
        <td>${row.irradiance.toFixed(2)}</td>
        <td class="mono">${date}</td>
        <td class="mono">${time}</td>
      `;
      
      // Add to END (newest last - chronological order)
      tbody.appendChild(tr);
      
      // Keep only last 200 rows to avoid memory issues
      while (tbody.children.length > 200) {
        tbody.removeChild(tbody.firstChild);
      }
      
      // Auto-scroll to bottom to see newest data
      const tableWrap = document.querySelector(".table-wrap");
      if (tableWrap) {
        tableWrap.scrollTop = tableWrap.scrollHeight;
      }
    }

    function startRealTimeStream() {
      // Use relative URL to avoid CORS/scheme issues
      const streamUrl = "/api/sensors/stream";
      console.log("🚀 Starting real-time stream...");
      console.log("🌐 Stream URL:", streamUrl);
      console.log("🌐 Window origin:", window.location.origin);
      
      try {
        const eventSource = new EventSource(streamUrl);
        let messageCount = 0;
        let connected = false;
        
        eventSource.onopen = () => {
          console.log("✅ SSE connection OPENED");
          connected = true;
          window.sseConnected = true;
          setStatus("✅ Conectado ao stream de tempo real", "ok");
        };
        
        eventSource.onmessage = (event) => {
          try {
            messageCount++;
            console.log(`📨 Message #${messageCount}:`, event.data.substring(0, 100));
            
            if (event.data.trim() === "") {
              console.log("💓 Heartbeat received");
              return;
            }
            
            const row = JSON.parse(event.data);
            console.log("✅ Parsed successfully:", row);
            addRowToTable(row);
            // Add to END of array (maintain chronological order)
            window.loadedSensorData.push(row);
            setStatus(`📊 ${row.device_id} - ${messageCount} msgs`, "ok");
          } catch (err) {
            console.error("❌ Parse error:", err.message, "Data:", event.data);
          }
        };
        
        eventSource.onerror = (err) => {
          connected = false;
          window.sseConnected = false;
          console.error("❌ SSE error:", err);
          console.error("ReadyState:", eventSource.readyState);
          setStatus("⚠️ Conexão perdida - reconectando...", "err");
          eventSource.close();
          
          setTimeout(() => {
            console.log("🔄 Tentando reconectar...");
            startRealTimeStream();
          }, 3000);
        };
        
        window.realTimeEventSource = eventSource;
        setStatus("📡 Conectando ao stream...", "ok");
      } catch (err) {
        console.error("❌ Failed to create EventSource:", err);
        setStatus(`❌ Erro: ${err.message}`, "err");
        window.sseConnected = false;
      }
    }

    // Start real-time stream when page loads
    console.log("🎯 Page initialized - starting stream");
    
    // Initialize window state
    window.sseConnected = false;
    window.loadedSensorData = [];
    
    // Wrap in try-catch so errors don't break the page
    try {
      // 1. Connect to SSE stream
      setTimeout(() => {
        try {
          startRealTimeStream();
        } catch (err) {
          console.error("❌ SSE init failed:", err);
          setStatus("⚠️ Modo sem stream real-time", "err");
        }
      }, 300);
    } catch (err) {
      console.error("❌ Fatal error:", err);
    }
  </script>
</body>
</html>
